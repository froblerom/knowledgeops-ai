<header class="app-header">
  <span class="app-title">KnowledgeOps-AI</span>
  <nav class="app-nav">
    <a routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Login</a>
    <a routerLink="/documents" routerLinkActive="active">Documents</a>
    <a routerLink="/chat" routerLinkActive="active" [hidden]="!visibility.canAskChat()">Chat</a>
    <a routerLink="/chat/history" routerLinkActive="active" [hidden]="!visibility.canViewChatHistory()">History</a>
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    @if (visibility.canViewAdmin()) {
      <a routerLink="/admin/users" routerLinkActive="active">Admin</a>
    }
  </nav>
</header>

<main class="app-content">
  <router-outlet />
</main>
